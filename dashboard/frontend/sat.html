<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Satélite M21s</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: Arial, sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        button { 
            padding: 25px 40px; 
            font-size: 24px; 
            font-weight: bold;
            background: #ff5e00; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 94, 0, 0.4);
            transition: 0.3s;
            z-index: 10;
        }
        button:active { transform: scale(0.95); }
        #status { 
            margin-top: 30px; 
            font-size: 18px; 
            color: #888; 
            text-align: center;
            padding: 0 20px;
            z-index: 10;
        }
        #error-log {
            color: #ff5555;
            margin-top: 20px;
            font-family: monospace;
            font-size: 14px;
            z-index: 10;
        }
        /* Animação de pulso para mostrar que está vivo */
        .orb {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,255,136,0.8) 0%, rgba(0,255,136,0) 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.2; }
            100% { transform: scale(1.2); opacity: 0.6; }
        }
        .speaking {
            background: radial-gradient(circle, rgba(255,94,0,0.8) 0%, rgba(255,94,0,0) 70%) !important;
            animation: pulse-fast 0.5s infinite alternate !important;
        }
        @keyframes pulse-fast {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="orb" id="orb"></div>
    <button id="btn" onclick="startSatellite()">🚀 Ativar Satélite</button>
    <div id="status">Aguardando ativação...</div>
    <div id="error-log"></div>

    <script>
        let ws;
        let context;
        // Variáveis GLOBAIS obrigatórias para o Chrome não matar o microfone (Garbage Collection bug)
        let globalStream;
        let globalSource;
        let globalProcessor;
        
        function logError(msg, err) {
            console.error(msg, err);
            document.getElementById('error-log').innerText += msg + (err ? ": " + err : "") + "\n";
            document.getElementById('btn').style.display = 'block';
        }

        async function startSatellite() {
            const btn = document.getElementById('btn');
            const statusLabel = document.getElementById('status');
            const orb = document.getElementById('orb');
            
            btn.style.display = 'none';
            document.getElementById('error-log').innerText = ""; 
            statusLabel.innerText = "Pedindo permissão do Microfone...";
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                logError("Seu navegador não suporta microfone.");
                return;
            }

            try {
                globalStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });
                
                statusLabel.innerText = "Microfone OK. Conectando ao cérebro...";
                
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                context = new AudioCtx({sampleRate: 16000});
                
                globalSource = context.createMediaStreamSource(globalStream);
                globalProcessor = context.createScriptProcessor(4096, 1, 1);
                
                globalSource.connect(globalProcessor);
                globalProcessor.connect(context.destination);
                
                const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
                const wsUrl = wsProtocol + window.location.host + "/api/ws/satellite/dashboard-virtual-mic";
                
                ws = new WebSocket(wsUrl);
                ws.binaryType = "arraybuffer";
                
                ws.onopen = () => {
                    statusLabel.innerHTML = "<h2 style='color:#00ff00'>Ouvindo...</h2><p>Pode falar a Wake Word.</p>";
                    orb.style.opacity = "1"; // Liga a luz verde
                };
                
                ws.onclose = () => {
                    statusLabel.innerHTML = "<h2 style='color:red'>🔴 Caiu a conexão.</h2><p>Recarregue a página.</p>";
                    btn.style.display = 'block';
                    btn.innerText = "Reconectar";
                    orb.style.opacity = "0";
                };
                
                ws.onerror = (err) => {
                    logError("Erro na conexão WebSocket.", "");
                };
                
                globalProcessor.onaudioprocess = (e) => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        const float32Array = e.inputBuffer.getChannelData(0);
                        const int16Array = new Int16Array(float32Array.length);
                        for (let i = 0; i < float32Array.length; i++) {
                            let s = Math.max(-1, Math.min(1, float32Array[i]));
                            int16Array[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                        }
                        ws.send(int16Array.buffer);
                    }
                };
                
                ws.onmessage = async (e) => {
                    if (e.data instanceof ArrayBuffer) {
                        try {
                            orb.classList.add("speaking"); // Muda a luz para laranja/rápido
                            statusLabel.innerHTML = "<h2 style='color:#ff5e00'>Falando...</h2>";
                            
                            const audioBuffer = await context.decodeAudioData(e.data);
                            const playSource = context.createBufferSource();
                            playSource.buffer = audioBuffer;
                            playSource.connect(context.destination);
                            
                            playSource.onended = () => {
                                orb.classList.remove("speaking"); // Volta pra verde
                                statusLabel.innerHTML = "<h2 style='color:#00ff00'>Ouvindo...</h2><p>Pode falar a Wake Word.</p>";
                            };
                            
                            playSource.start();
                        } catch (err) {
                            logError("Erro ao tocar áudio", err);
                        }
                    }
                };
                
            } catch (err) {
                logError("Erro Crítico", err.message);
                statusLabel.innerText = "Falha ao iniciar. Permita o microfone!";
            }
        }
    </script>
</body>
</html>
